<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Indica - Premium Menu</title>
    <style>
        :root { 
            --primary-green: #1a3c1a; 
            --accent-green: #27ae60; 
            --momo-orange: #e67e22;
            --light-bg: #f4f7f4; 
            --card-bg: #ffffff;
            --text-color: #333333;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --light-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--light-bg); 
            margin: 0; 
            padding: 0; 
            padding-bottom: 110px; 
            color: var(--text-color);
            transition: 0.3s;
            scroll-behavior: smooth;
        }

        header { 
            background: var(--card-bg);
            padding: 30px 15px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            position: relative;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header h1 { color: var(--primary-green); margin: 0; font-size: 36px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        header p { margin: 5px 0 0; color: #666; font-style: italic; font-size: 14px; }

        .category-nav {
            position: sticky;
            top: 0;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 12px 5px;
            display: flex;
            overflow-x: auto;
            gap: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .nav-btn { background: rgba(0,0,0,0.05); border: none; padding: 8px 18px; border-radius: 20px; white-space: nowrap; font-weight: 600; color: var(--text-color); cursor: pointer; transition: 0.3s; font-size: 13px; }
        .nav-btn:hover { background: var(--primary-green); color: white; }

        .offer-slider { background: linear-gradient(90deg, #e74c3c, #f39c12, #e74c3c); color: white; overflow: hidden; white-space: nowrap; padding: 10px 0; font-weight: bold; font-size: 13px; margin: 15px; border-radius: 12px; }
        .offer-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .container { max-width: 900px; margin: 0 auto; padding: 0 15px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        
        h2 { color: var(--primary-green); font-size: 20px; margin: 40px 0 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        h2::before { content: ""; width: 4px; height: 20px; background: var(--primary-green); border-radius: 10px; }

        .menu-item { background: var(--card-bg); padding: 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--card-shadow); transition: 0.3s; border: 1px solid rgba(0,0,0,0.02); position: relative; }
        .menu-item:hover { transform: translateY(-3px); }

        .best-seller-tag { position: absolute; top: -10px; left: 15px; background: #f1c40f; color: #000; font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        
        .item-info { flex: 1; margin-right: 15px; }
        .item-name { font-weight: 700; display: block; color: var(--text-color); font-size: 15px; margin-bottom: 4px; }
        .item-price { color: #2ecc71; font-weight: 700; font-size: 14px; }
        
        .controls { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 25px; }
        .btn-qty { background: var(--primary-green); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .qty-val { font-weight: 800; min-width: 20px; text-align: center; color: var(--primary-green); }

        .extra-note { text-align: center; margin: 40px 0; font-weight: bold; color: #d35400; background: #fff8e1; padding: 12px; border-radius: 12px; border: 1px dashed #f39c12; }
        
        .payment-options { margin-top: 5px; font-size: 12px; display: flex; gap: 10px; color: white; }
        .payment-options label { cursor: pointer; display: flex; align-items: center; gap: 4px; }

        .cart-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 500px; background: var(--primary-green); color: white; padding: 14px 20px; border-radius: 30px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 1000; flex-wrap: wrap; gap: 10px; }
        .cart-info { flex: 1; }
        .order-btn { background: white; color: var(--primary-green); border: none; padding: 10px 22px; border-radius: 50px; font-weight: 800; cursor: pointer; }

        /* Payment Modal */
        #payment-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-content h3 { color: var(--primary-green); margin-bottom: 10px; }
        .modal-content p { font-size: 14px; color: #444; margin-bottom: 15px; line-height: 1.4; }
        .modal-content img { width: 100%; max-width: 200px; margin-bottom: 15px; border: 1px solid #eee; padding: 10px; border-radius: 10px; }
        .pay-direct-btn {
            background: #5f259f; /* PhonePe Purple */
            color: white; border: none;
            padding: 12px; border-radius: 10px;
            width: 100%; font-weight: bold; margin-bottom: 10px; cursor: pointer;
        }
        .done-btn {
            background: var(--primary-green);
            color: white; border: none;
            padding: 12px; border-radius: 10px;
            width: 100%; font-weight: bold; cursor: pointer;
        }

        @media (max-width: 768px) { .menu-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <button class="theme-toggle" onclick="toggleDarkMode()" id="theme-btn">🌙</button>
    <h1>Cafe Indica</h1>
    <p>Deliciously Yours</p>
</header>

<div class="category-nav" id="cat-nav"></div>

<div class="container">
    <div class="offer-slider">
        <div class="offer-text">
            🍲 NEW ARRIVAL: CHICKEN STEW WITH BREAD AT JUST ₹85! TRY NOW! &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; ✨ WELCOME TO CAFE INDICA - FRESH & TASTY ✨
        </div>
    </div>
    <div id="menu-container"></div>
    <div class="extra-note">🧀 Want it extra cheesy? Add Extra Cheese for just ₹20</div>
</div>

<div id="payment-modal">
    <div class="modal-content">
        <h3>UPI Payment</h3>
        <p>Amount to Pay: <b>₹<span id="modal-amt">0</span></b></p>
        <button class="pay-direct-btn" id="direct-upi-link">Open PhonePe/GPay</button>
        <p style="font-size: 11px; margin: 5px 0;">OR SCAN QR BELOW</p>
        <img src="https://i.ibb.co/LzdZ3xYv/1000357393.jpg" alt="QR Code">
        <button class="done-btn" onclick="proceedToWhatsApp()">Sent Screenshot & Order &rarr;</button>
    </div>
</div>

<div class="cart-bar" id="cart-bar">
    <div class="cart-info">
        <div><b id="total-qty">0</b> Items | <b id="total-amt">₹0</b></div>
        <div class="payment-options">
            <span>Pay:</span>
            <label><input type="radio" name="payMethod" value="UPI" checked> UPI</label>
            <label><input type="radio" name="payMethod" value="Cash"> Cash</label>
        </div>
    </div>
    <button class="order-btn" onclick="handleOrder()">Order Now &rarr;</button>
</div>

<script>
    const MY_UPI_ID = "8697781622@ibl"; 
    const MY_NAME = "ABHAY BASFORE";

    const menuData = {
        "Tea ☕": [{n: "Milk Tea (S)", p: 20}, {n: "Milk Tea (L)", p: 30}, {n: "Elaichi Tea", p: 30}, {n: "Black Tea", p: 20}, {n: "Lemon Tea", p: 15, b: true}, {n: "Masala Lemon Tea", p: 20, b: true}, {n: "Green Tea", p: 20}],
        "Coffee ☕": [{n: "Milk Coffee", p: 35}, {n: "Black Coffee", p: 20}, {n: "Cold Coffee", p: 70, b: true}, {n: "Vanilla Hot Coffee", p: 50}, {n: "Chocolate Hot Coffee", p: 50}],
        "Chicken Stew 🍲": [{n: "Chicken Stew with Bread", p: 85, b: true}],
        "Momo 🥟": [{n: "Fried Chicken Momo (6ps)", p: 90}, {n: "Pan-Fried Chicken Momo (6ps)", p: 120}],
        "Sandwich 🥪": [{n: "Veg Sandwich", p: 80}, {n: "Corn Sandwich", p: 90}, {n: "Veg Cheese Sandwich", p: 100, b: true}, {n: "Chicken Sandwich", p: 100}, {n: "Chicken Cheese Sandwich", p: 120, b: true}],
        "Burger 🍔": [{n: "Veg Burger", p: 70, b: true}, {n: "Chicken Burger", p: 90, b: true}, {n: "Veg Cheese Burger", p: 90}, {n: "Chicken Cheese Burger", p: 110}, {n: "Grilled Chicken Burger", p: 110}],
        "Pasta 🍝": [{n: "White Sauce Pasta", p: 110}, {n: "Red Tomato Pasta", p: 110}, {n: "Chicken Pasta", p: 150, b: true}],
        "Maggie 🍜": [{n: "Veg Maggie", p: 60}, {n: "Maggie (Plain)", p: 50}, {n: "Corn Maggie", p: 70}, {n: "Chicken Maggie", p: 90, b: true}, {n: "Egg Maggie", p: 70}],
        "Salad 🥗": [{n: "High Protein Veg Salad", p: 66}, {n: "High Protein Chicken Salad", p: 150, b: true}],
        "Snacks 🍟": [{n: "French Fries (M)", p: 70, b: true}, {n: "French Fries (L)", p: 90, b: true}, {n: "Peri Peri Fries (M)", p: 100}, {n: "Peri Peri Fries (L)", p: 120}, {n: "Fish Finger (5ps)", p: 130}, {n: "Chicken Finger (5ps)", p: 140}, {n: "Chicken Nugget (5ps)", p: 90, b: true}, {n: "Chicken Cheese Ball", p: 90}],
        "Beverage 🍹": [{n: "Lime Soda", p: 80}, {n: "Virgin Mojito", p: 80}, {n: "Blue Lagoon", p: 80, b: true}, {n: "Kacha Mango Mojito", p: 80}, {n: "Green Apple", p: 80}],
        "Combos 🎁": [{n: "Fries(M)+Chicken Burger+Soft Drink", p: 150, b: true}, {n: "Fries(M)+Veg Burger+Veg Sandwich", p: 168, b: true}, {n: "2 Chicken Sandwich + 5 Fish Finger", p: 270, b: true}]
    };

    let cart = {};

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        document.getElementById('theme-btn').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }

    function renderMenu() {
        const container = document.getElementById('menu-container');
        const nav = document.getElementById('cat-nav');
        let menuHtml = '', navHtml = '';

        for (const [cat, items] of Object.entries(menuData)) {
            const catId = cat.split(' ')[0].toLowerCase();
            navHtml += `<button class="nav-btn" onclick="document.getElementById('${catId}').scrollIntoView({behavior: 'smooth'})">${cat}</button>`;
            menuHtml += `<h2 id="${catId}">${cat}</h2><div class="menu-grid">`;
            items.forEach(item => {
                const id = item.n.replace(/[^a-zA-Z0-9]/g, '');
                let bestTag = item.b ? '<span class="best-seller-tag">★ BEST SELLER</span>' : '';
                menuHtml += `<div class="menu-item">${bestTag}<div class="item-info"><span class="item-name">${item.n}</span><span class="item-price">₹${item.p}</span></div><div class="controls"><button class="btn-qty" onclick="updateQty('${item.n}',${item.p},-1,'${id}','${catId}')">−</button><span class="qty-val" id="qty-${id}">0</span><button class="btn-qty" onclick="updateQty('${item.n}',${item.p},1,'${id}','${catId}')">+</button></div></div>`;
            });
            menuHtml += `</div>`;
        }
        container.innerHTML = menuHtml; nav.innerHTML = navHtml;
    }

    function updateQty(name, price, delta, id, catId) {
        if (!cart[name]) cart[name] = { qty: 0, price: price, cat: catId };
        cart[name].qty += delta;
        if (cart[name].qty <= 0) { delete cart[name]; document.getElementById(`qty-${id}`).innerText = 0; }
        else { document.getElementById(`qty-${id}`).innerText = cart[name].qty; }
        updateCartBar();
    }

    function updateCartBar() {
        const bar = document.getElementById('cart-bar');
        let tQty = 0, tAmt = 0;
        for (const i in cart) { tQty += cart[i].qty; tAmt += (cart[i].qty * cart[i].price); }
        if (tQty > 0) { bar.style.display = 'flex'; document.getElementById('total-qty').innerText = tQty; document.getElementById('total-amt').innerText = '₹' + tAmt; }
        else bar.style.display = 'none';
    }

    function handleOrder() {
        const payMethod = document.querySelector('input[name="payMethod"]:checked').value;
        const totalAmt = document.getElementById('total-amt').innerText.replace('₹', '');
        
        if(payMethod === "UPI") {
            const upiUrl = `upi://pay?pa=${MY_UPI_ID}&pn=${encodeURIComponent(MY_NAME)}&am=${totalAmt}&cu=INR&mode=02&purpose=00`;
            document.getElementById('modal-amt').innerText = totalAmt;
            document.getElementById('direct-upi-link').onclick = () => { window.location.href = upiUrl; };
            document.getElementById('payment-modal').style.display = 'flex';
        } else {
            proceedToWhatsApp();
        }
    }

    function proceedToWhatsApp() {
        const payMethod = document.querySelector('input[name="payMethod"]:checked').value;
        let totalAmt = 0;
        let msg = "🍲 *New Order - Cafe Indica*%0A---------------------------%0A";
        for (const i in cart) { 
            msg += `• *${i}* x ${cart[i].qty} = ₹${cart[i].qty * cart[i].price}%0A`; 
            totalAmt += cart[i].qty * cart[i].price;
        }
        msg += `---------------------------%0A*Total: ₹${totalAmt}*%0A*Payment:* ${payMethod}%0A%0A✅ *Self-Pickup Order*`;
        window.open(`https://wa.me/918697781622?text=${msg}`, '_blank');
        document.getElementById('payment-modal').style.display = 'none';
    }

    renderMenu();
</script>
</body>
</html>
