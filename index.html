<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Indica - Order Menu</title>
    <style>
        :root { --primary-green: #1a3c1a; --offer-green: #27ae60; --light-bg: #f9f9f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--light-bg); margin: 0; padding: 0; padding-bottom: 100px; }
        
        /* --- Sliding Offer Bar --- */
        .offer-slider {
            background: #e74c3c;
            color: white;
            overflow: hidden;
            white-space: nowrap;
            padding: 8px 0;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px; /* Space before menu */
            border-radius: 10px; /* Thoda curved look */
        }
        .offer-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        /* -------------------------- */

        .container { max-width: 950px; margin: 20px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 3px solid var(--primary-green); margin-bottom: 15px; padding-bottom: 10px; }
        h1 { color: var(--primary-green); margin: 0; font-size: 32px; text-transform: uppercase; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        h2 { color: var(--primary-green); border-bottom: 2px solid var(--primary-green); padding-bottom: 5px; margin-top: 25px; font-size: 18px; text-transform: uppercase; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dotted #ccc; }
        .item-info { flex: 1; margin-right: 10px; }
        .item-name { font-weight: 600; display: block; color: #333; font-size: 15px; }
        .item-price { color: #666; font-size: 13px; }
        .item-offer { color: var(--offer-green); font-size: 11px; font-weight: bold; display: block; margin-top: 2px; }
        .controls { display: flex; align-items: center; gap: 8px; background: #f0f0f0; padding: 4px 10px; border-radius: 20px; }
        .btn-qty { background: var(--primary-green); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .qty-val { font-weight: bold; min-width: 15px; text-align: center; }
        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--primary-green); color: white; padding: 15px 25px; border-radius: 50px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; }
        .order-btn { background: white; color: var(--primary-green); border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        @media (max-width: 768px) { .menu-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Cafe Indica</h1>
        <p>Deliciously Yours</p>
    </header>

    <div class="offer-slider">
        <div class="offer-text">
            🔥 SPECIAL RAMADAN OFFER: BUY 2 BURGERS & GET 1 BURGER FREE! ✨ LIMITED TIME ONLY! 🍔 ENJOY YOUR MEAL AT CAFE INDICA! 🥤
        </div>
    </div>

    <div class="menu-grid" id="menu-container"></div>
    <div style="text-align: center; margin-top: 30px; font-weight: bold; color: var(--primary-green); background: #fef9e7; padding: 10px; border-radius: 10px;">Extra Cheese: ₹20</div>
</div>

<div class="cart-bar" id="cart-bar">
    <div><span id="total-qty">0</span> Items | <span id="total-amt">₹0</span></div>
    <button class="order-btn" onclick="sendToWhatsApp()">Order on WhatsApp &rarr;</button>
</div>

<script>
    const menuData = {
        "Tea": [
            {n: "Milk Tea (S)", p: 20}, {n: "Milk Tea (L)", p: 30}, {n: "Elaichi Tea", p: 30},
            {n: "Black Tea", p: 20}, {n: "Lemon Tea", p: 15}, {n: "Masala Lemon Tea", p: 20}, {n: "Green Tea", p: 20}
        ],
        "Coffee": [
            {n: "Milk Coffee", p: 35}, {n: "Black Coffee", p: 20}, {n: "Cold Coffee", p: 70},
            {n: "Vanilla Hot Coffee", p: 50}, {n: "Chocolate Hot Coffee", p: 50}
        ],
        "Sandwich": [
            {n: "Veg Sandwich", p: 80}, {n: "Corn Sandwich", p: 90}, {n: "Veg Cheese Sandwich", p: 100},
            {n: "Chicken Sandwich", p: 100}, {n: "Chicken Cheese Sandwich", p: 120}
        ],
        "Burger": [
            {n: "Veg Burger", p: 70}, {n: "Chicken Burger", p: 90}, {n: "Veg Cheese Burger", p: 90},
            {n: "Chicken Cheese Burger", p: 110}, {n: "Grilled Chicken Burger", p: 110}
        ],
        "Pasta": [
            {n: "White Sauce Pasta", p: 110}, {n: "Red Tomato Pasta", p: 110}, {n: "Chicken Pasta", p: 150}
        ],
        "Maggie": [
            {n: "Veg Maggie", p: 60}, {n: "Maggie (Plain)", p: 50}, {n: "Corn Maggie", p: 70},
            {n: "Chicken Maggie", p: 90}, {n: "Egg Maggie", p: 70}
        ],
        "Salad": [
            {n: "High Protein Veg Salad", p: 66}, {n: "High Protein Chicken Salad", p: 150}
        ],
        "Snacks": [
            {n: "French Fries (M)", p: 70}, {n: "French Fries (L)", p: 90}, {n: "Peri Peri Fries (M)", p: 100},
            {n: "Peri Peri Fries (L)", p: 120}, {n: "Fish Finger (5ps)", p: 130}, {n: "Chicken Finger (5ps)", p: 140},
            {n: "Chicken Nugget (5ps)", p: 90}, {n: "Chicken Cheese Ball", p: 90}
        ],
        "Beverage": [
            {n: "Lime Soda", p: 80}, {n: "Virgin Mojito", p: 80}, {n: "Blue Lagoon", p: 80},
            {n: "Kacha Mango Mojito", p: 80}, {n: "Green Apple", p: 80}
        ],
        "Combos": [
            {n: "Fries(M)+Chicken Burger+Soft Drink", p: 150},
            {n: "Fries(M)+Veg Burger+Veg Sandwich", p: 168},
            {n: "2 Chicken Sandwich + 5 Fish Finger", p: 270}
        ]
    };

    let cart = {};

    function renderMenu() {
        const container = document.getElementById('menu-container');
        let html = '';
        for (const [cat, items] of Object.entries(menuData)) {
            html += `<div class="column"><h2>${cat}</h2>`;
            items.forEach(item => {
                const id = item.n.replace(/[^a-zA-Z0-9]/g, '');
                let offerTag = (cat === "Burger") ? `<span class="item-offer">B2G1 Free Applied</span>` : '';

                html += `<div class="menu-item"><div class="item-info"><span class="item-name">${item.n}</span><span class="item-price">₹${item.p}</span>${offerTag}</div>
                <div class="controls"><button class="btn-qty" onclick="updateQty('${item.n}',${item.p},-1,'${id}','${cat}')">-</button>
                <span class="qty-val" id="qty-${id}">0</span><button class="btn-qty" onclick="updateQty('${item.n}',${item.p},1,'${id}','${cat}')">+</button></div></div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    function updateQty(name, price, delta, id, category) {
        if (!cart[name]) cart[name] = { qty: 0, price: price, cat: category };
        cart[name].qty += delta;
        if (cart[name].qty <= 0) { delete cart[name]; document.getElementById(`qty-${id}`).innerText = 0; }
        else { document.getElementById(`qty-${id}`).innerText = cart[name].qty; }
        updateCartBar();
    }

    function updateCartBar() {
        const bar = document.getElementById('cart-bar');
        let tQty = 0, tAmt = 0, bQty = 0, bPrice = 0;
        for (const i in cart) { 
            tQty += cart[i].qty; 
            tAmt += (cart[i].qty * cart[i].price); 
            if(cart[i].cat === "Burger") { bQty += cart[i].qty; bPrice = cart[i].price; }
        }
        if (bQty >= 3) tAmt -= (Math.floor(bQty/3) * bPrice);

        if (tQty > 0) { bar.style.display = 'flex'; document.getElementById('total-qty').innerText = tQty; document.getElementById('total-amt').innerText = '₹' + tAmt; }
        else bar.style.display = 'none';
    }

    function sendToWhatsApp() {
        let msg = "New Order - Cafe Indica%0A--------------------%0A";
        let total = 0, bQty = 0, bPrice = 0;
        for (const i in cart) { 
            msg += `• ${i} x ${cart[i].qty} = ₹${cart[i].qty * cart[i].price}%0A`; 
            total += cart[i].qty * cart[i].price;
            if(cart[i].cat === "Burger") { bQty += cart[i].qty; bPrice = cart[i].price; }
        }
        if (bQty >= 3) {
            let disc = Math.floor(bQty/3) * bPrice;
            total -= disc;
            msg += `%0A🎁 Offer: B2G1 FREE (-₹${disc})%0A`;
        }
        msg += `--------------------%0A*Total: ₹${total}*`;
        window.open(`https://wa.me/918697781622?text=${msg}`, '_blank');
    }
    renderMenu();
</script>
</body>
</html>
